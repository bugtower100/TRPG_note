name: Build and Publish Docker Image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag"
        required: false
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        shell: bash
        run: |
          image_name="ghcr.io/${GITHUB_REPOSITORY,,}"
          manual_tag="${{ inputs.image_tag }}"

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            version_tag="${GITHUB_REF_NAME}"
          elif [[ -n "${manual_tag}" ]]; then
            version_tag="${manual_tag}"
          else
            version_tag="manual-${GITHUB_SHA::7}"
          fi

          {
            echo "image_name=${image_name}"
            echo "version_tag=${version_tag}"
            echo "tags<<EOF"
            echo "${image_name}:${version_tag}"
            if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
              echo "${image_name}:latest"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.title=TRPG_note
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version_tag }}

