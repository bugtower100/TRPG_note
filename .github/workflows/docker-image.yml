name: Build and Publish Docker Image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag"
        required: false
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  build-headless-binary:
    strategy:
      fail-fast: false
      matrix:
        goarch:
          - amd64
          - arm64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve app version
        id: version
        shell: bash
        run: |
          raw="$(tr -d '\r\n' < version.txt)"
          raw="${raw#v}"
          echo "version_tag=v${raw}" >> "${GITHUB_OUTPUT}"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build headless Linux binary
        working-directory: server
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.goarch }} go build -tags headless -trimpath -ldflags "-s -w" -o release/trpg-note-${{ matrix.goarch }}

      - name: Upload headless binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: trpg-note-headless-linux-${{ matrix.goarch }}
          path: server/release/trpg-note-${{ matrix.goarch }}
          if-no-files-found: error

  docker:
    needs: build-headless-binary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download headless binary artifact
        uses: actions/download-artifact@v4
        with:
          pattern: trpg-note-headless-linux-*
          merge-multiple: true
          path: .docker-bin

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        shell: bash
        run: |
          image_name="ghcr.io/${GITHUB_REPOSITORY,,}"
          manual_tag="${{ inputs.image_tag }}"
          file_tag="${{ steps.version.outputs.version_tag }}"

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            version_tag="${GITHUB_REF_NAME}"
          elif [[ -n "${manual_tag}" ]]; then
            version_tag="${manual_tag}"
          elif [[ -n "${file_tag}" ]]; then
            version_tag="${file_tag}"
          else
            version_tag="manual-${GITHUB_SHA::7}"
          fi

          {
            echo "image_name=${image_name}"
            echo "version_tag=${version_tag}"
            echo "tags<<EOF"
            echo "${image_name}:${version_tag}"
            if [[ "${GITHUB_REF}" == refs/tags/* || -n "${manual_tag}" ]]; then
              echo "${image_name}:latest"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.title=TRPG_note
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version_tag }}
