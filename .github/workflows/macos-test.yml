name: Build macOS Test Package

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: "Output zip name"
        required: true
        default: "TRPG模组笔记-macos-arm64-test.zip"
      app_version:
        description: "Displayed app version"
        required: true
        default: "test"

permissions:
  contents: read

jobs:
  build-macos-test:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build macOS arm64 binary
        working-directory: server
        env:
          GOOS: darwin
          GOARCH: arm64
          CGO_ENABLED: 1
        run: go build -o release/trpg-note

      - name: Package macOS app
        shell: bash
        env:
          APP_VERSION: ${{ inputs.app_version }}
        run: |
          bash ./scripts/package-macos-app.sh "server/release/trpg-note" "${{ inputs.package_name }}"

      - name: Verify macOS app bundle structure
        shell: bash
        run: |
          APP_PATH="server/release/TRPG模组笔记.app"
          test -d "$APP_PATH"
          test -f "$APP_PATH/Contents/Info.plist"
          test -x "$APP_PATH/Contents/MacOS/trpg-note"
          test -x "$APP_PATH/Contents/MacOS/trpg-note-launcher"
          plutil -lint "$APP_PATH/Contents/Info.plist"

      - name: Upload macOS test artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-test-package
          path: ${{ inputs.package_name }}
          if-no-files-found: error
