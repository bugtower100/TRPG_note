name: Build and Release Windows EXE

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release Tag"
        required: true
        default: "v1.2"
      release_name:
        description: "Release Name"
        required: true
        default: "V1.2"
      prerelease:
        description: "Mark as prerelease"
        required: true
        default: "false"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Windows EXE
        working-directory: server
        run: go build -o release/TRPG模组笔记.exe

      - name: Create ZIP
        shell: pwsh
        run: |
          $staging = "server/release/package"
          if (Test-Path $staging) {
            Remove-Item -Path $staging -Recurse -Force
          }
          New-Item -Path $staging -ItemType Directory | Out-Null

          Copy-Item -Path "server/release/TRPG模组笔记.exe" -Destination "$staging/TRPG模组笔记.exe" -Force

          if (Test-Path "server/release/data") {
            Copy-Item -Path "server/release/data" -Destination "$staging/data" -Recurse -Force
          } else {
            New-Item -Path "$staging/data" -ItemType Directory | Out-Null
          }

          Compress-Archive `
            -Path "$staging/*" `
            -DestinationPath "TRPG模组笔记-windows-amd64.zip" `
            -Force

      - name: Validate release tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        shell: pwsh
        run: |
          if ("${{ inputs.release_tag }}" -notmatch "^v\d+\.\d+(\.\d+)?$") {
            throw "release_tag 必须是 vX.Y 或 vX.Y.Z 格式，例如 v1.2 或 v1.2.0"
          }

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.release_tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.release_name }}
          prerelease: ${{ startsWith(github.ref, 'refs/tags/') && false || (inputs.prerelease == 'true') }}
          draft: false
          make_latest: true
          body: |
            ## ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.release_name }} 更新内容
            - 重构富文本编辑器内核，改为基于 Milkdown 的 Markdown 编辑链路，降低编辑态崩溃风险
            - 重构富文本展示链路，移除对 React live DOM 的直接篡改，提升预览稳定性
            - 保留并重建自动实体增强能力，支持实体、区块、子项目在编辑态与展示态自动高亮、悬浮提示与跳转
            - 修复富文本换行、外部预览显示 Markdown 源标记、链接规范化、列表渲染异常等问题
            - 修复富文本列表样式丢失问题，统一编辑态与展示态的列表显示效果
            - 修复角色、怪物、地点、组织等实体卡片简介来源不一致的问题，统一从默认主区块提取简短描述
            - 重构富文本图片插入流程，接入现有资源库上传与选择，不再使用本地 base64 直写正文
            - 新增富文本图片自动上传能力，支持粘贴图片、拖拽图片后自动上传并插入内容
          files: TRPG模组笔记-windows-amd64.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
