name: Build and Release Windows EXE

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release Tag"
        required: true
        default: "v1.2.1"
      release_name:
        description: "Release Name"
        required: true
        default: "V1.2.1"
      prerelease:
        description: "Mark as prerelease"
        required: true
        default: "false"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Windows EXE
        working-directory: server
        run: go build -o release/TRPG模组笔记.exe

      - name: Create ZIP
        shell: pwsh
        run: |
          $staging = "server/release/package"
          if (Test-Path $staging) {
            Remove-Item -Path $staging -Recurse -Force
          }
          New-Item -Path $staging -ItemType Directory | Out-Null

          Copy-Item -Path "server/release/TRPG模组笔记.exe" -Destination "$staging/TRPG模组笔记.exe" -Force

          if (Test-Path "server/release/data") {
            Copy-Item -Path "server/release/data" -Destination "$staging/data" -Recurse -Force
          } else {
            New-Item -Path "$staging/data" -ItemType Directory | Out-Null
          }

          Compress-Archive `
            -Path "$staging/*" `
            -DestinationPath "TRPG模组笔记-windows-amd64.zip" `
            -Force

      - name: Validate release tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        shell: pwsh
        run: |
          if ("${{ inputs.release_tag }}" -notmatch "^v\d+\.\d+(\.\d+)?$") {
            throw "release_tag 必须是 vX.Y 或 vX.Y.Z 格式，例如 v1.2 或 v1.2.0"
          }

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.release_tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.release_name }}
          prerelease: ${{ startsWith(github.ref, 'refs/tags/') && false || (inputs.prerelease == 'true') }}
          draft: false
          make_latest: true
          body: |
            ## ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.release_name }} 更新内容
            - 新增交互式新手引导系统：以高亮定位、分步提示的方式引导核心功能上手
            - 各主要页面右上角新增可重复打开的问号入口，随时查看当前页面的功能说明
            - 新手引导覆盖创建模组、进入模组后的核心功能导航、卡片右上角分栏打开、详情页名称修改、设置页主题与资源管理
            - 修复资源重复上传问题：新增文件内容哈希判断，相同图片会直接复用已有资源
            - 优化富文本图片工作流：资源库选择、上传插入、粘贴图片、拖拽图片现在共用统一资源链路
            - 收敛富文本自动匹配范围：取消子项目自动匹配，仅保留实体与区块匹配，减少误命中
            - 优化富文本列表渲染与展示一致性，修复编辑态和展示态列表样式异常
            - 统一角色、怪物、地点、组织等实体卡片的简介提取逻辑，提升列表与悬浮信息稳定性
          files: TRPG模组笔记-windows-amd64.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
