name: Build and Release Desktop Packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release Tag"
        required: false
        default: ""
      release_name:
        description: "Release Name"
        required: false
        default: ""
      prerelease:
        description: "Mark as prerelease"
        required: true
        default: "false"

permissions:
  contents: write

jobs:
  build-packages:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            goos: windows
            goarch: amd64
            artifact_name: release-windows-amd64
            package_name: TRPG模组笔记-windows-amd64.zip
          - os: windows-latest
            platform: windows
            goos: windows
            goarch: arm64
            artifact_name: release-windows-arm64
            package_name: TRPG模组笔记-windows-arm64.zip
          - os: ubuntu-latest
            platform: linux
            goos: linux
            goarch: amd64
            artifact_name: release-linux-amd64
            package_name: TRPG模组笔记-linux-amd64.tar.gz
          - os: ubuntu-latest
            platform: linux
            goos: linux
            goarch: arm64
            artifact_name: release-linux-arm64
            package_name: TRPG模组笔记-linux-arm64.tar.gz
          - os: macos-14
            platform: macos
            goos: darwin
            goarch: arm64
            artifact_name: release-macos-arm64
            package_name: TRPG模组笔记-macos-arm64.zip
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve app version
        id: version
        shell: bash
        run: |
          raw="$(tr -d '\r\n' < version.txt)"
          raw="${raw#v}"
          echo "app_version=${raw}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=v${raw}" >> "${GITHUB_OUTPUT}"
          echo "package_name=TRPG模组笔记-${raw}-${{ matrix.platform }}-${{ matrix.goarch }}${{ matrix.platform == 'windows' && '.zip' || matrix.platform == 'macos' && '.zip' || '.tar.gz' }}" >> "${GITHUB_OUTPUT}"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "effective_tag=${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"
          elif [[ -n "${{ inputs.release_tag }}" ]]; then
            echo "effective_tag=${{ inputs.release_tag }}" >> "${GITHUB_OUTPUT}"
          else
            echo "effective_tag=v${raw}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Windows EXE
        if: ${{ matrix.platform == 'windows' }}
        working-directory: server
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -ldflags "-X main.buildAppVersion=${{ steps.version.outputs.effective_tag }}" -o release/TRPG模组笔记.exe

      - name: Create Windows ZIP
        if: ${{ matrix.platform == 'windows' }}
        shell: pwsh
        run: |
          $staging = "server/release/package"
          if (Test-Path $staging) {
            Remove-Item -Path $staging -Recurse -Force
          }
          New-Item -Path $staging -ItemType Directory | Out-Null

          Copy-Item -Path "server/release/TRPG模组笔记.exe" -Destination "$staging/TRPG模组笔记.exe" -Force

          if (Test-Path "server/release/data") {
            Copy-Item -Path "server/release/data" -Destination "$staging/data" -Recurse -Force
          } else {
            New-Item -Path "$staging/data" -ItemType Directory | Out-Null
          }

          Compress-Archive `
            -Path "$staging/*" `
            -DestinationPath "${{ steps.version.outputs.package_name }}" `
            -Force

      - name: Build Linux binary
        if: ${{ matrix.platform == 'linux' }}
        working-directory: server
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -ldflags "-X main.buildAppVersion=${{ steps.version.outputs.effective_tag }}" -o release/trpg-note

      - name: Build macOS app binary
        if: ${{ matrix.platform == 'macos' }}
        working-directory: server
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        run: go build -ldflags "-X main.buildAppVersion=${{ steps.version.outputs.effective_tag }}" -o release/trpg-note

      - name: Create Linux tar.gz
        if: ${{ matrix.platform == 'linux' }}
        shell: bash
        run: |
          staging="server/release/package"
          rm -rf "$staging"
          mkdir -p "$staging"

          cp "server/release/trpg-note" "$staging/trpg-note"
          chmod +x "$staging/trpg-note"

          if [ -d "server/release/data" ]; then
            cp -R "server/release/data" "$staging/data"
          else
            mkdir -p "$staging/data"
          fi

          tar -C "$staging" -czf "${{ steps.version.outputs.package_name }}" .

      - name: Create macOS app package
        if: ${{ matrix.platform == 'macos' }}
        shell: bash
        env:
          APP_VERSION: ${{ steps.version.outputs.effective_tag }}
        run: |
          bash ./scripts/package-macos-app.sh "server/release/trpg-note" "${{ steps.version.outputs.package_name }}"

      - name: Verify macOS app bundle structure
        if: ${{ matrix.platform == 'macos' }}
        shell: bash
        run: |
          APP_PATH="server/release/TRPG模组笔记.app"
          test -d "$APP_PATH"
          test -f "$APP_PATH/Contents/Info.plist"
          test -x "$APP_PATH/Contents/MacOS/trpg-note"
          test -x "$APP_PATH/Contents/MacOS/trpg-note-launcher"
          plutil -lint "$APP_PATH/Contents/Info.plist"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ steps.version.outputs.package_name }}
          if-no-files-found: error

  publish-release:
    needs: build-packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release meta
        id: version
        shell: bash
        run: |
          raw="$(tr -d '\r\n' < version.txt)"
          raw="${raw#v}"
          file_tag="v${raw}"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF_NAME}"
          elif [[ -n "${{ inputs.release_tag }}" ]]; then
            tag="${{ inputs.release_tag }}"
          else
            tag="${file_tag}"
          fi
          if [[ -n "${{ inputs.release_name }}" ]]; then
            name="${{ inputs.release_name }}"
          else
            name="${tag}"
          fi
          echo "app_version=${raw}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "name=${name}" >> "${GITHUB_OUTPUT}"

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true

      - name: Validate release tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        shell: bash
        run: |
          if [[ ! "${{ steps.version.outputs.tag }}" =~ ^v[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "release_tag 必须是 vX.Y 或 vX.Y.Z 格式，例如 v1.2 或 v1.2.0" >&2
            exit 1
          fi

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.version.outputs.name }}
          prerelease: ${{ startsWith(github.ref, 'refs/tags/') && false || (inputs.prerelease == 'true') }}
          draft: false
          make_latest: true
          body: |
            ## ${{ steps.version.outputs.name }} 更新内容
            - 匹配了没有st的简化卡；
            - 建立模组后在主页更改模组名功能；
            - fix：修复团队笔记连接超时问题
          files: |
            TRPG模组笔记-${{ steps.version.outputs.app_version }}-windows-amd64.zip
            TRPG模组笔记-${{ steps.version.outputs.app_version }}-windows-arm64.zip
            TRPG模组笔记-${{ steps.version.outputs.app_version }}-linux-amd64.tar.gz
            TRPG模组笔记-${{ steps.version.outputs.app_version }}-linux-arm64.tar.gz
            TRPG模组笔记-${{ steps.version.outputs.app_version }}-macos-arm64.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
