name: Build and Release Desktop Packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release Tag"
        required: true
        default: "v1.4.3"
      release_name:
        description: "Release Name"
        required: true
        default: "v1.4.3"
      prerelease:
        description: "Mark as prerelease"
        required: true
        default: "false"

permissions:
  contents: write

jobs:
  build-packages:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            goarch: amd64
            artifact_name: release-windows-amd64
            package_name: TRPG模组笔记-windows-amd64.zip
          - os: ubuntu-latest
            platform: linux
            goos: linux
            goarch: amd64
            artifact_name: release-linux-amd64
            package_name: TRPG模组笔记-linux-amd64.tar.gz
          - os: ubuntu-latest
            platform: linux
            goos: linux
            goarch: arm64
            artifact_name: release-linux-arm64
            package_name: TRPG模组笔记-linux-arm64.tar.gz
          - os: macos-14
            platform: macos
            goos: darwin
            goarch: arm64
            artifact_name: release-macos-arm64
            package_name: TRPG模组笔记-macos-arm64.zip
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Windows EXE
        if: ${{ matrix.platform == 'windows' }}
        working-directory: server
        run: go build -o release/TRPG模组笔记.exe

      - name: Create Windows ZIP
        if: ${{ matrix.platform == 'windows' }}
        shell: pwsh
        run: |
          $staging = "server/release/package"
          if (Test-Path $staging) {
            Remove-Item -Path $staging -Recurse -Force
          }
          New-Item -Path $staging -ItemType Directory | Out-Null

          Copy-Item -Path "server/release/TRPG模组笔记.exe" -Destination "$staging/TRPG模组笔记.exe" -Force

          if (Test-Path "server/release/data") {
            Copy-Item -Path "server/release/data" -Destination "$staging/data" -Recurse -Force
          } else {
            New-Item -Path "$staging/data" -ItemType Directory | Out-Null
          }

          Compress-Archive `
            -Path "$staging/*" `
            -DestinationPath "TRPG模组笔记-windows-amd64.zip" `
            -Force

      - name: Build Linux binary
        if: ${{ matrix.platform == 'linux' }}
        working-directory: server
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -o release/trpg-note

      - name: Build macOS app binary
        if: ${{ matrix.platform == 'macos' }}
        working-directory: server
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        run: go build -o release/trpg-note

      - name: Create Linux tar.gz
        if: ${{ matrix.platform == 'linux' }}
        shell: bash
        run: |
          staging="server/release/package"
          rm -rf "$staging"
          mkdir -p "$staging"

          cp "server/release/trpg-note" "$staging/trpg-note"
          chmod +x "$staging/trpg-note"

          if [ -d "server/release/data" ]; then
            cp -R "server/release/data" "$staging/data"
          else
            mkdir -p "$staging/data"
          fi

          tar -C "$staging" -czf "${{ matrix.package_name }}" .

      - name: Create macOS app package
        if: ${{ matrix.platform == 'macos' }}
        shell: bash
        env:
          APP_VERSION: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.release_tag }}
        run: |
          bash ./scripts/package-macos-app.sh "server/release/trpg-note" "${{ matrix.package_name }}"

      - name: Verify macOS app bundle structure
        if: ${{ matrix.platform == 'macos' }}
        shell: bash
        run: |
          APP_PATH="server/release/TRPG模组笔记.app"
          test -d "$APP_PATH"
          test -f "$APP_PATH/Contents/Info.plist"
          test -x "$APP_PATH/Contents/MacOS/trpg-note"
          test -x "$APP_PATH/Contents/MacOS/trpg-note-launcher"
          plutil -lint "$APP_PATH/Contents/Info.plist"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.package_name }}
          if-no-files-found: error

  publish-release:
    needs: build-packages
    runs-on: ubuntu-latest

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true

      - name: Validate release tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        shell: bash
        run: |
          if [[ ! "${{ inputs.release_tag }}" =~ ^v[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "release_tag 必须是 vX.Y 或 vX.Y.Z 格式，例如 v1.2 或 v1.2.0" >&2
            exit 1
          fi

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.release_tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.release_name }}
          prerelease: ${{ startsWith(github.ref, 'refs/tags/') && false || (inputs.prerelease == 'true') }}
          draft: false
          make_latest: true
          body: |
            ## ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.release_name }} 更新内容
            - 新增 macOS arm64 应用包；压缩包 `TRPG模组笔记-macos-arm64.zip` 解压后为 `TRPG模组笔记-macOS/` 目录，内含 `TRPG模组笔记.app` 与 `macOS终端启动说明.txt`。
            - 新增 登录可选密码 功能，未设置密码时仍可空密码登录，兼容旧数据。
            - 新增 公开模组进入密码 ，GM 可设置/清除，PL 进入公开模组时需要密码，旧模组未设置时可直接进入。
            - 新增 主页模组卡片移除 PL 功能，可把中途跳车或长期不再进入的 PL 从成员列表移除。
            - 新增 图片上传自动压缩 ，上传时转为 webp ，资源缩略图统一调整为 64px 。
            - 新增 实体标题颜色自定义 ，角色、怪物、地点、组织、事件、线索、时间线等卡片标题支持自行选色。
            - 修复 未来科技主题 下主页欢迎文字过暗、看不见的问题。
            - 重做了时间线界面，支持多条时间线
            - 调整了展开逻辑
            - 增设了一键展开/收起
          files: |
            TRPG模组笔记-windows-amd64.zip
            TRPG模组笔记-linux-amd64.tar.gz
            TRPG模组笔记-linux-arm64.tar.gz
            TRPG模组笔记-macos-arm64.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
